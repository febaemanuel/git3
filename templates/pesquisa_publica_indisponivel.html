<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indisponível</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 text-center">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5">
                    <div style="font-size: 64px;">🕒</div>
                    <h4 class="mt-3">Pesquisa indisponível</h4>
                    <p class="text-muted">
                        {{ motivo if motivo else 'Esta pesquisa não está aceitando respostas no momento.' }}
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
