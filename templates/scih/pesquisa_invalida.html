<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link inválido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card-err { background: white; border-radius: 14px; padding: 40px; text-align: center; max-width: 520px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon { font-size: 64px; color: #dc3545; }
    </style>
</head>
<body>
    <div class="card-err">
        <i class="bi bi-x-circle-fill icon"></i>
        <h3 class="mt-3">Link inválido ou expirado</h3>
        <p class="text-muted">Não conseguimos encontrar essa pesquisa. Verifique se você clicou no link correto enviado pelo WhatsApp.</p>
    </div>
</body>
</html>
